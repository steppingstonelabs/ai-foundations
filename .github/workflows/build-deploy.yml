name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Type check
        working-directory: site
        run: npm run check

      - name: Build site
        working-directory: site
        run: npm run build
        env:
          SITE_URL: ${{ secrets.SITE_URL || 'https://workshop.steppingstonelabs.com' }}

      - name: Verify build output
        working-directory: site
        run: |
          echo "Checking build output..."
          ls -la dist/
          echo "Checking for index.html..."
          test -f dist/index.html && echo "✓ index.html exists" || exit 1
          echo "Checking for session pages..."
          test -d dist/sessions && echo "✓ sessions directory exists" || exit 1
          SESSION_COUNT=$(find dist/sessions -name "index.html" | wc -l)
          echo "✓ Found $SESSION_COUNT session pages"
          if [ "$SESSION_COUNT" -lt 17 ]; then
            echo "✗ Expected at least 17 session pages, found $SESSION_COUNT"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: site/dist/
          retention-days: 7

  deploy:
    name: Deploy to Netlify
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy from GitHub Actions - ${{ github.sha }}'
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10
